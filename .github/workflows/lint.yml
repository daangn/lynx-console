on:
  pull_request:

name: Lint

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: 'yarn'

      - name: Install Dependencies
        run: yarn install --immutable

      - name: Run Biome Check
        run: yarn check
